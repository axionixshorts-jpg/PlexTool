# Project-wide Gradle settings.
#
# NOTE: In CI this file is regenerated by `expo prebuild --clean`. The same
# critical memory/dexing settings are re-applied by the GitHub Actions workflow
# AFTER prebuild (see .github/workflows/android-build.yml). This committed copy
# is what local / non-prebuild builds use.

# Give the Gradle/D8 JVM enough heap so `:app:mergeExtDexDebug` does not throw
# java.lang.OutOfMemoryError while merging the many native libraries' dex.
org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true

android.useAndroidX=true

# Jetifier is not required for React Native 0.81 / AndroidX-only dependencies.
# Disabling it speeds up the build and lowers peak memory usage.
android.enableJetifier=false

# IMPORTANT: do NOT set `android.enableDexingArtifactTransform=false`.
# That forces a single, monolithic external-dex merge which is what caused the
# `DexArchiveMergerException` / D8 OutOfMemoryError. Leaving it at its default
# (true) enables incremental, per-library dexing that merges efficiently.

android.enablePngCrunchInReleaseBuilds=true

reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# React Native Reanimated 4.x (used by this project) ONLY supports the New
# Architecture (Fabric). It must be enabled or the app fails to build/run.
newArchEnabled=true

hermesEnabled=true

edgeToEdgeEnabled=true

expo.gif.enabled=true
expo.webp.enabled=true
expo.webp.animated=false

EX_DEV_CLIENT_NETWORK_INSPECTOR=true

expo.useLegacyPackaging=false
expo.edgeToEdgeEnabled=true

android.minSdkVersion=29
android.compileSdkVersion=36
android.targetSdkVersion=36
android.buildToolsVersion=36.0.0
