name: Android Build

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      # Keep CI noise down and make Expo non-interactive.
      EXPO_NO_TELEMETRY: "1"
      CI: "1"

    defaults:
      run:
        working-directory: anything/apps/mobile

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: anything/apps/mobile/package-lock.json

      - name: Install Dependencies
        # `npm install` (not `npm ci`) reconciles any lockfile drift instead of
        # failing hard, which avoids the "npm ci / lockfile out of sync" errors.
        run: npm install --no-audit --no-fund

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components (API 36 for Expo SDK 54)
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Expo Prebuild Android
        # --no-install: dependencies are already installed above.
        # --clean: regenerate a pristine android/ folder.
        run: npx expo prebuild --platform android --clean --no-install

      - name: Apply Gradle build tuning (post-prebuild)
        # `expo prebuild --clean` regenerates android/gradle.properties from the
        # Expo template (which only gives the Gradle JVM ~2 GB of heap). That is
        # the root cause of the `:app:mergeExtDex*` D8 OutOfMemoryError.
        # Properties files are last-write-wins, so appending here overrides the
        # template defaults and guarantees enough heap for dex merging.
        working-directory: anything/apps/mobile/android
        run: |
          {
            echo ""
            echo "# ===== Injected by CI after 'expo prebuild --clean' ====="
            echo "# Large heap prevents D8 OutOfMemoryError during external dex merging."
            echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
            echo "org.gradle.parallel=true"
            echo "org.gradle.caching=true"
            echo "org.gradle.configureondemand=true"
            echo "android.enableJetifier=false"
            echo "# Keep the release APK un-minified so R8/ProGuard can't strip"
            echo "# classes that React Native / native modules access reflectively."
            echo "android.enableMinifyInReleaseBuilds=false"
            echo "android.enableProguardInReleaseBuilds=false"
            echo "android.enableShrinkResourcesInReleaseBuilds=false"
          } >> gradle.properties
          echo "----- effective gradle.properties -----"
          cat gradle.properties

      - name: Verify Android Folder
        run: |
          ls -la .
          ls -la android

      - name: Make Gradle Executable
        working-directory: anything/apps/mobile/android
        run: chmod +x gradlew

      - name: Place google-services.json (post-prebuild)
        # `expo prebuild --clean` wipes the whole android/ folder, so a
        # google-services.json dropped into android/app/ does NOT survive CI.
        # Commit it at anything/apps/mobile/google-services.json instead; this
        # step copies it back into android/app/ after prebuild. Safe no-op when
        # the file is absent (the app runs fine without it).
        run: |
          if [ -f google-services.json ]; then
            cp google-services.json android/app/google-services.json
            echo "Placed google-services.json into android/app/"
          else
            echo "No google-services.json at anything/apps/mobile/ — skipping (not required to run the app)."
          fi

      - name: Build Release APK
        # A *release* APK embeds the JS bundle and sets __DEV__=false, so it runs
        # standalone (no Metro dev server). A debug APK does the opposite and is
        # why the installed app froze on the splash screen. Release is signed
        # with the committed debug.keystore, so it installs without extra setup.
        working-directory: anything/apps/mobile/android
        env:
          # EXPO_PUBLIC_* values are inlined into the JS bundle during this step
          # (Metro `export:embed`). Set them as repository *Variables*
          # (Settings > Secrets and variables > Actions > Variables) so the app
          # can reach your backend. The build still succeeds if they are unset,
          # but features needing the backend (login, data) won't work until set.
          EXPO_PUBLIC_CREATE_ENV: ${{ vars.EXPO_PUBLIC_CREATE_ENV }}
          EXPO_PUBLIC_BASE_URL: ${{ vars.EXPO_PUBLIC_BASE_URL }}
          EXPO_PUBLIC_PROXY_BASE_URL: ${{ vars.EXPO_PUBLIC_PROXY_BASE_URL }}
          EXPO_PUBLIC_PROJECT_GROUP_ID: ${{ vars.EXPO_PUBLIC_PROJECT_GROUP_ID }}
          EXPO_PUBLIC_HOST: ${{ vars.EXPO_PUBLIC_HOST }}
          EXPO_PUBLIC_UPLOADCARE_PUBLIC_KEY: ${{ vars.EXPO_PUBLIC_UPLOADCARE_PUBLIC_KEY }}
          EXPO_PUBLIC_REVENUE_CAT_PLAY_STORE_API_KEY: ${{ vars.EXPO_PUBLIC_REVENUE_CAT_PLAY_STORE_API_KEY }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: anything/apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
