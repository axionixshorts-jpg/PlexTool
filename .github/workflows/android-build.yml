name: Android Build

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: anything/apps/mobile/package-lock.json

      - name: Install Dependencies
        working-directory: anything/apps/mobile
        run: npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components
        run: |
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Expo Prebuild Android
        working-directory: anything/apps/mobile
        run: |
          npx expo prebuild --platform android --clean

      - name: Verify Android Folder
        run: |
          ls -la anything/apps/mobile
          ls -la anything/apps/mobile/android

      - name: Make Gradle Executable
        working-directory: anything/apps/mobile/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: anything/apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: anything/apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
